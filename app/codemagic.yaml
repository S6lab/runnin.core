# Codemagic CI/CD — runnin Flutter app
#
# Este arquivo mora em /app/codemagic.yaml. No Codemagic UI o "Project path"
# precisa estar setado como `app` (a app Flutter é monorepo dentro de
# runnin.core/app). Com isso o Codemagic acha pubspec.yaml + android/ + ios/
# e os scripts rodam direto na pasta certa — sem precisar de working_directory.
#
# Workflows:
#  - android-debug   → APK de smoke, sem signing, dispara em PRs pra main
#  - android-release → AAB assinado + deploy interno na Play Store em tag v*
#  - ios-release     → STUB (desativado até APNs key + signing identity)
#
# Pré-requisitos no Codemagic UI:
#  - Settings > Integrations > Google Play → conectar SA JSON do GCP
#    (a mesma que você já criou com permissão no Play Console)
#  - Variable group `google_play` com env var GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
#  - Code signing > Android → upload do keystore .jks com alias `runnin_keystore`

workflows:
  android-debug:
    name: Android Debug APK
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: 3.41.9
      java: 17
      vars:
        # API base do staging. Sem isso, app bate em produção desatualizada.
        API_BASE_URL: "https://runnin-api-staging-rogiz7losq-rj.a.run.app"
        # VAPID Web Push (sem efeito em build Android; reservado pra cross-build).
        FIREBASE_VAPID_KEY: "BE1oX84SuJLSCWO-JqYSyIFEtCEPj8d4ol3xWlwPHmBp_ncd372Fsau6Fr5mYxIjzpWKfg5KZcM8ueoMQu78P5Q"
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: false
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
      - name: Build Android APK (debug)
        script: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --dart-define=FIREBASE_VAPID_KEY=$FIREBASE_VAPID_KEY
    artifacts:
      - build/**/outputs/**/*.apk

  android-release:
    name: Android Release (Play Internal)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.41.9
      java: 17
      groups:
        # Define no Codemagic UI > Environment variables > Groups:
        # - google_play.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON (secure)
        - google_play
      vars:
        API_BASE_URL: "https://runnin-api-rogiz7losq-rj.a.run.app"  # PROD
        FIREBASE_VAPID_KEY: "BE1oX84SuJLSCWO-JqYSyIFEtCEPj8d4ol3xWlwPHmBp_ncd372Fsau6Fr5mYxIjzpWKfg5KZcM8ueoMQu78P5Q"
        PACKAGE_NAME: "com.reniuslab.runnin"
        GOOGLE_PLAY_TRACK: "internal"
      android_signing:
        - runnin_keystore  # upload do .jks via Codemagic UI > Code signing
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build Android AAB (release, signed)
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --dart-define=FIREBASE_VAPID_KEY=$FIREBASE_VAPID_KEY
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: false
        in_app_update_priority: 3

  ios-release:
    # STUB — habilitar depois que tiver: APNs key no Firebase + Apple
    # Developer signing identity + provisioning profile no Codemagic.
    name: iOS Release (TestFlight) [DISABLED]
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.41.9
      xcode: latest
    triggering:
      events: []  # manual only — sem trigger automático até estar configurado
    scripts:
      - name: Placeholder
        script: |
          echo "iOS workflow desativado. Habilitar:"
          echo "1. Upload APNs key no Firebase Console > Cloud Messaging"
          echo "2. Codemagic UI > Code signing > iOS > Apple Developer integration"
          echo "3. Trocar events: [] -> events: [tag] e copiar passos do android-release"
          exit 0
