name: runnin
description: "runnin.ai — AI Running Coach"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5
  firebase_messaging: ^15.2.5

  # State management
  flutter_riverpod: ^2.6.1
  # riverpod_annotation removido — não há @Riverpod em uso. Bloqueava
  # upgrade de json_serializable necessário pro gemini_live.

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.1

  # GPS & Maps
  geolocator: ^13.0.4
  flutter_background_service: ^5.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local storage
  hive_flutter: ^1.1.0

  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # Utils
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  intl: ^0.20.2
  uuid: ^4.5.1
  google_sign_in: ^6.2.2
  flutter_bloc: ^9.1.1
  firebase_storage: ^12.4.10
  file_picker: ^11.0.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  # Apple HealthKit (iOS) + Google Health Connect (Android) unified plugin.
  # Web não suportado — guard com kIsWeb antes de chamar.
  health: ^13.3.1
  # Coach Live audio (mic capture + playback) for Gemini Live multimodal.
  record: ^5.2.1
  audioplayers: ^6.1.0
  # Gemini Live multimodal (text/audio bidi). Substitui TTS legado (ElevenLabs)
  # nos cues automáticos da run — app fala direto com Gemini, sem proxy.
  gemini_live: ^2026.4.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  equatable: ^2.0.5
  # riverpod_generator removido junto com riverpod_annotation — bloqueava
  # upgrade do source_gen necessário pelo json_serializable atual.
  json_serializable: ^6.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/warmup_exercises.json
    - assets/img/hero/
