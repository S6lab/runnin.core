# Codemagic CI/CD — runnin.core (monorepo: app Flutter em /app)
#
# A app Flutter mora em ./app. Codemagic clona o repo inteiro e cada
# script faz `cd app` antes dos comandos flutter. Mantemos o yaml na raiz
# porque essa é a localização que o Codemagic varre por padrão.
#
# Workflows ATIVOS:
#  - android-debug    → APK em push pra main (smoke + analyze + APK staging)
#  - android-release  → AAB assinado + Play Store internal em tag v*
#  - ios-release      → IPA assinado + TestFlight em tag v* (ver pré-reqs no bloco)
#
# Web foi REMOVIDO daqui (era web-staging em push pra main + web-production em
# tag v*). Deploy do web Firebase Hosting agora é manual — usa o canal staging
# via `firebase hosting:channel:deploy staging` rodado da máquina do dev, e o
# live é deploy direto também manual. Razão: pra evitar redeploy automático em
# cada commit e poder testar mudanças cirúrgicas no browser antes de subir.
#
# Pré-requisitos no Codemagic UI (Settings):
#  Code signing → Android → upload keystore .jks com reference `runnin_keystore`
#  Integrations → Google Play → conecta SA JSON (a mesma com permissão no Play Console)
#  Environment variables → Groups:
#    `google_play`:
#       - GOOGLE_PLAY_SERVICE_ACCOUNT_JSON (secure, conteúdo do SA JSON)
#    `runnin_secrets` (opcional, pra centralizar):
#       - FIREBASE_VAPID_KEY (pode ficar plain, é embutido no JS web)

definitions:
  env_versions: &env_versions
    flutter: 3.41.9
    java: 17
    xcode: latest

  shared_vars: &shared_vars
    API_BASE_URL_STAGING: "https://runnin-api-staging-rogiz7losq-rj.a.run.app"
    API_BASE_URL_PROD: "https://runnin-api-rogiz7losq-rj.a.run.app"
    FIREBASE_VAPID_KEY: "BE1oX84SuJLSCWO-JqYSyIFEtCEPj8d4ol3xWlwPHmBp_ncd372Fsau6Fr5mYxIjzpWKfg5KZcM8ueoMQu78P5Q"
    PACKAGE_NAME: "com.s6lab.runnin"

workflows:
  # ───────────────────────────── Android ─────────────────────────────
  android-debug:
    name: Android Debug APK
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      <<: *env_versions
      vars:
        <<: *shared_vars
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Pub get
        script: cd app && flutter pub get
      - name: Analyze
        script: cd app && flutter analyze --no-fatal-infos
      - name: Build debug APK
        script: |
          cd app
          flutter build apk --debug \
            --dart-define=API_BASE_URL=$API_BASE_URL_STAGING \
            --dart-define=FIREBASE_VAPID_KEY=$FIREBASE_VAPID_KEY
    artifacts:
      - app/build/**/outputs/**/*.apk

  android-release:
    name: Android Release (Play Internal)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      <<: *env_versions
      groups:
        - google_play
      vars:
        <<: *shared_vars
        GOOGLE_PLAY_TRACK: "internal"
      android_signing:
        - runnin_keystore
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Pub get
        script: cd app && flutter pub get
      # build.gradle.kts lê signing config de android/key.properties (mesma
      # convenção do dev local). Em CI, Codemagic injeta CM_KEYSTORE_PATH /
      # CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS / CM_KEY_PASSWORD via
      # `android_signing: - runnin_keystore`. Aqui só materializamos isso
      # num key.properties efêmero antes do build.
      #
      # Fail-fast: se alguma variável estiver vazia, é sinal que o keystore
      # `runnin_keystore` não foi uploaded no Codemagic UI (App settings →
      # Code signing identities → Android keystores). Sem isso, o gradle
      # cai em NPE no signReleaseBundle 8min depois — preferimos abortar já.
      - name: Generate key.properties from Codemagic signing vars
        script: |
          set -e
          missing=""
          [ -z "$CM_KEYSTORE_PATH" ] && missing="$missing CM_KEYSTORE_PATH"
          [ -z "$CM_KEYSTORE_PASSWORD" ] && missing="$missing CM_KEYSTORE_PASSWORD"
          [ -z "$CM_KEY_ALIAS" ] && missing="$missing CM_KEY_ALIAS"
          [ -z "$CM_KEY_PASSWORD" ] && missing="$missing CM_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "ERROR: Codemagic signing vars ausentes:$missing"
            echo "Faça upload do keystore .jks em App settings → Code signing identities"
            echo "→ Android keystores → reference name: runnin_keystore"
            exit 1
          fi
          if [ ! -f "$CM_KEYSTORE_PATH" ]; then
            echo "ERROR: CM_KEYSTORE_PATH=$CM_KEYSTORE_PATH não existe no FS do runner"
            exit 1
          fi
          cat > app/android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
          echo "key.properties materializado (storeFile=$CM_KEYSTORE_PATH)"
      - name: Build release AAB (signed)
        script: |
          cd app
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL_PROD \
            --dart-define=FIREBASE_VAPID_KEY=$FIREBASE_VAPID_KEY
    artifacts:
      - app/build/**/outputs/**/*.aab
      - app/build/**/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: false
        in_app_update_priority: 3

  # ───────────────────────────── iOS (TestFlight) ─────────────────────
  ios-release:
    # Pré-requisitos (uma vez) antes do primeiro build:
    #  1. Apple Developer Program ativo + App ID `com.s6lab.runnin` com as
    #     capabilities Push Notifications e HealthKit habilitadas no portal.
    #  2. App criado no App Store Connect com o mesmo bundle id.
    #  3. Firebase Console > Cloud Messaging → upload da APNs Auth Key (.p8 +
    #     Key ID + Team ID) pra push chegar no device.
    #  4. Codemagic > Team settings > Integrations > App Store Connect → cria
    #     uma API key (role App Manager) e nomeia `runnin_app_store_connect`.
    #     É esse nome que `integrations.app_store_connect` referencia: o
    #     Codemagic usa a key pra buscar/gerar o distribution cert + o
    #     provisioning profile App Store automaticamente (bloco ios_signing).
    #
    # Dispara na MESMA tag v* do android-release: uma tag → AAB no Play
    # internal + IPA no TestFlight.
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: runnin_app_store_connect
    environment:
      <<: *env_versions
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.s6lab.runnin
      vars:
        <<: *shared_vars
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Pub get
        script: cd app && flutter pub get
      # Aplica o provisioning profile App Store (baixado via ios_signing) no
      # Runner.xcodeproj e gera o export_options.plist em $HOME. Roda da raiz
      # do repo: o use-profiles varre **/*.xcodeproj e acha app/ios.
      - name: Set up code signing (use-profiles)
        script: xcode-project use-profiles
      # PROJECT_BUILD_NUMBER é o contador monotônico do Codemagic (mesmo do
      # android-release) → CFBundleVersion único e crescente no TestFlight.
      # Se um dia subir build manual com número maior, troque por:
      #   --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID") + 1))
      - name: Build IPA (signed, release)
        script: |
          cd app
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL_PROD \
            --dart-define=FIREBASE_VAPID_KEY=$FIREBASE_VAPID_KEY \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Promoção pra App Store review fica manual: valida no TestFlight
        # primeiro, depois submete no App Store Connect.
